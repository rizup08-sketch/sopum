<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미디어센터 소품리스트</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
    body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .toggle-checkbox:checked { right: 0; border-color: #4f46e5; transform: translateX(100%);}
    .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }
    .toggle-checkbox { right: 24px; border-color: #e5e7eb; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#F8F9FA] text-slate-900 pb-24 min-h-screen relative">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-md text-slate-900 p-4 sticky top-0 z-30 border-b border-slate-100">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <h1 class="text-xl font-extrabold flex items-center gap-2 tracking-tight">
        <i data-lucide="aperture" class="w-6 h-6 text-indigo-600"></i>
        미디어센터 소품리스트
      </h1>
      <div class="flex items-center gap-2">
        <div id="sync-indicator" class="flex items-center gap-1 text-[10px] font-bold px-2 py-1.5 rounded-full bg-slate-100 text-slate-400">
          <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> 연결 중
        </div>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-100 sticky top-[68px] z-20 pt-2 pb-3 px-4">
    <div class="max-w-md mx-auto flex bg-slate-100 rounded-2xl p-1 shadow-inner">
      <button id="btn-tab-master" onclick="switchTab('master')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm">
        소품 쇼룸
      </button>
      <button id="btn-tab-logs" onclick="switchTab('logs')" class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-400 relative">
        반출, 반입 목록
        <span id="log-badge-container" class="absolute top-2 right-4 flex h-2 w-2"></span>
      </button>
    </div>
  </nav>

  <main class="max-w-md mx-auto p-4">
    <!-- Master Tab -->
    <div id="tab-master" class="space-y-6">
      <div class="relative">
        <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        <input type="text" id="search-input" placeholder="어떤 소품을 찾으시나요?" oninput="handleSearch()"
               class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border border-slate-100 shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-medium">
      </div>
      
      <div id="props-container">
        <!-- Loading -->
        <div class="flex flex-col items-center justify-center py-20 text-slate-400 gap-3">
          <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-indigo-500"></i>
          <p class="text-sm font-medium">데이터 동기화 중...</p>
        </div>
      </div>
    </div>

    <!-- Logs Tab -->
    <div id="tab-logs" class="hidden">
      <div id="logs-container" class="space-y-4"></div>
    </div>
  </main>

  <!-- 플로팅 액션 버튼 (+) -->
  <button onclick="openPropModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all z-30">
    <i data-lucide="plus" class="w-6 h-6"></i>
  </button>

  <!-- ★ 통합된 단일 모달 (정보 수정, 상태 기록, 이미지 업로드가 하나로 합쳐짐) -->
  <div id="prop-modal-overlay" class="fixed inset-0 bg-slate-900/60 z-[60] flex items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm transition-all duration-300 opacity-0 pointer-events-none" onclick="closePropModal()">
    <div id="prop-modal-content" class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] shadow-2xl flex flex-col max-h-[92vh] sm:max-h-[85vh] transform transition-all duration-300 translate-y-full sm:translate-y-10 sm:scale-95 opacity-0" onclick="event.stopPropagation()">
      
      <!-- 헤더 -->
      <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white rounded-t-[32px] sm:rounded-t-[32px] shrink-0">
        <h2 id="modal-main-title" class="font-extrabold text-lg text-slate-900">✨ 소품 관리</h2>
        <button onclick="closePropModal()" class="bg-slate-50 rounded-full p-2 text-slate-400 hover:text-slate-900 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      
      <!-- 스크롤 가능한 본문 영역 -->
      <div class="overflow-y-auto px-6 py-6 space-y-8 hide-scrollbar flex-1">
        <input type="hidden" id="form-prop-id">
        
        <!-- 사진 영역 (미리보기 + 업로드) -->
        <div class="flex gap-4">
          <div id="form-img-container" class="w-24 h-24 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center overflow-hidden relative shrink-0 cursor-pointer group" onclick="openOriginalImageFromModal()">
            <img id="form-img-preview" src="" class="w-full h-full object-cover hidden">
            <i id="form-no-img-icon" data-lucide="image" class="w-8 h-8 text-slate-300"></i>
            <button id="btn-remove-img" type="button" onclick="removeImage(event)" class="absolute top-1 right-1 bg-black/60 text-white rounded-full p-1 hover:bg-red-500 hidden z-10 transition-colors"><i data-lucide="x" class="w-3 h-3"></i></button>
          </div>
          <div class="flex-1">
            <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition-colors group">
              <i data-lucide="upload-cloud" class="w-6 h-6 text-slate-300 group-hover:text-indigo-500 mb-1"></i>
              <span id="upload-status-text" class="text-[11px] font-extrabold text-slate-400 group-hover:text-indigo-600">사진 업로드</span>
              <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
            </label>
            <input type="hidden" id="form-image-url">
          </div>
        </div>

        <!-- 기본 정보 -->
        <div class="space-y-4">
          <h3 class="text-sm font-extrabold text-slate-900 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-indigo-500"></i> 기본 정보</h3>
          <div>
            <label class="text-[10px] font-extrabold text-slate-400 block mb-1">소품명 <span class="text-indigo-500">*</span></label>
            <input type="text" id="form-name" placeholder="상품명 입력" class="w-full border-b-2 border-slate-100 py-2 focus:border-indigo-500 outline-none text-sm font-extrabold text-slate-900 bg-transparent transition-all">
          </div>
          <div class="grid grid-cols-2 gap-5">
            <div>
              <label class="text-[10px] font-extrabold text-slate-400 block mb-1">분류</label>
              <input type="text" id="form-category" placeholder="카테고리" class="w-full border-b-2 border-slate-100 py-2 focus:border-indigo-500 outline-none text-sm font-bold text-slate-900 bg-transparent transition-all">
            </div>
            <div>
              <label class="text-[10px] font-extrabold text-slate-400 block mb-1">수량</label>
              <input type="number" id="form-qty" value="1" min="1" class="w-full border-b-2 border-slate-100 py-2 focus:border-indigo-500 outline-none text-sm font-bold text-slate-900 bg-transparent text-center">
            </div>
          </div>
          <div>
            <label class="text-[10px] font-extrabold text-slate-400 block mb-1">보관 위치 (자동 색상 반영)</label>
            <input type="text" id="form-location" placeholder="어느 창고/선반인가요? (예: 파랑색 1)" class="w-full border-b-2 border-slate-100 py-2 focus:border-indigo-500 outline-none text-sm font-bold text-slate-900 bg-transparent transition-all">
          </div>
          <!-- 색상 강제 지정용 (보이지 않게 처리하고 자동화 로직으로 대체됨) -->
          <div class="hidden">
            <input type="radio" name="loc-color" value="slate" checked>
          </div>
        </div>

        <!-- 반출 및 상태 기록 -->
        <div class="space-y-4 pt-6 border-t border-slate-100">
          <h3 class="text-sm font-extrabold text-slate-900 flex items-center gap-2"><i data-lucide="clipboard-check" class="w-4 h-4 text-indigo-500"></i> 반출 및 상태 기록</h3>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
              <label class="text-[10px] font-extrabold text-slate-400 block mb-1">반출일</label>
              <input type="text" id="form-outdate" placeholder="예: 04/15" class="w-full bg-transparent text-sm font-extrabold text-slate-900 outline-none">
            </div>
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
              <label class="text-[10px] font-extrabold text-slate-400 block mb-1">사용자</label>
              <input type="text" id="form-user" placeholder="팀명/성함" class="w-full bg-transparent text-sm font-extrabold text-slate-900 outline-none">
            </div>
          </div>
          <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
            <label class="text-[10px] font-extrabold text-slate-400 block mb-1">메모 및 특이사항</label>
            <input type="text" id="form-note" placeholder="파손 주의 등 상세 내용" class="w-full bg-transparent text-sm font-extrabold text-slate-900 outline-none">
          </div>
          <label class="flex items-center justify-between bg-white border border-slate-200 rounded-2xl p-5 cursor-pointer hover:bg-slate-50 transition-colors">
            <span class="text-sm font-extrabold text-slate-900">현물 반납 완료</span>
            <div class="relative inline-block w-12 h-6 align-middle select-none transition duration-200 ease-in">
              <input type="checkbox" id="form-returned" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-200 appearance-none cursor-pointer z-10 transition-all"/>
              <label for="form-returned" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer transition-colors"></label>
            </div>
          </label>
        </div>
      </div>
      
      <!-- 하단 액션 버튼 -->
      <div class="p-4 border-t border-slate-100 bg-white flex gap-3 rounded-b-[32px] sm:rounded-b-[32px] shrink-0">
        <button id="btn-delete" onclick="handleDelete()" class="w-14 h-14 bg-red-50 text-red-500 rounded-2xl font-bold hover:bg-red-100 transition-all flex items-center justify-center shrink-0 hidden">
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </button>
        <button onclick="handleSave()" id="btn-save-text" class="flex-1 bg-indigo-600 text-white rounded-2xl font-extrabold text-base hover:bg-indigo-700 shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
          저장하기
        </button>
      </div>
    </div>
  </div>

  <!-- 이미지 원본 확대용 모달 -->
  <div id="img-view-modal" class="fixed inset-0 bg-black/95 z-[70] hidden flex items-center justify-center p-4" onclick="closeImgView()">
    <button class="absolute top-8 right-8 text-white p-2" onclick="closeImgView()"><i data-lucide="x" class="w-8 h-8"></i></button>
    <img id="modal-img-tag" src="" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl transition-transform" onclick="event.stopPropagation()">
  </div>

  <!-- Toast & Confirm Custom -->
  <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>
  <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-sm">
    <div class="bg-white rounded-[32px] w-full max-w-sm p-8 text-center shadow-2xl scale-95 transition-all">
      <div class="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5"><i data-lucide="alert-triangle" class="w-7 h-7"></i></div>
      <h3 id="confirm-title" class="font-extrabold text-xl text-slate-900 mb-2"></h3>
      <p id="confirm-message" class="text-sm font-medium text-slate-400 mb-8 leading-relaxed"></p>
      <div class="flex gap-3">
        <button onclick="closeConfirm()" class="flex-1 py-4 rounded-2xl bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-colors">취소</button>
        <button id="confirm-yes-btn" class="flex-1 py-4 rounded-2xl bg-red-500 text-white font-bold hover:bg-red-600 shadow-lg shadow-red-100 transition-colors">삭제</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // -------------------------------------------------------------------------
    // ★ 파이어베이스 설정
    // -------------------------------------------------------------------------
    let firebaseConfig = {
      apiKey: "AIzaSyBX0--OTcOwgEoKjUq1QN5uhH_vmnNQT9Q",
      authDomain: "sopum-list.firebaseapp.com",
      projectId: "sopum-list",
      storageBucket: "sopum-list.firebasestorage.app",
      messagingSenderId: "232475521218",
      appId: "1:232475521218:web:0beb79f9c04fb316ad4b5b",
      measurementId: "G-27N9WB445Z"
    };
    try {
      if (typeof __firebase_config !== 'undefined') {
        const envConfig = JSON.parse(__firebase_config);
        if (Object.keys(envConfig).length > 0) firebaseConfig = envConfig;
      }
    } catch(e) {}

    // -------------------------------------------------------------------------
    // ★ Cloudinary 설정
    // -------------------------------------------------------------------------
    const CLOUDINARY_CLOUD_NAME = "dwjkpawch"; 
    const CLOUDINARY_UPLOAD_PRESET = "sopum_list"; 

    let propsData = [];
    let logs = [];
    let searchTerm = '';
    let currentView = 'locations'; 
    let selectedLocation = null;
    let db, auth, appId;

    const colorMap = {
      slate: { bg: 'bg-slate-50', text: 'text-slate-500', hover: 'hover:border-slate-500' },
      red: { bg: 'bg-red-50', text: 'text-red-500', hover: 'hover:border-red-500' },
      amber: { bg: 'bg-amber-50', text: 'text-amber-500', hover: 'hover:border-amber-500' },
      emerald: { bg: 'bg-emerald-50', text: 'text-emerald-500', hover: 'hover:border-emerald-500' },
      indigo: { bg: 'bg-indigo-50', text: 'text-indigo-500', hover: 'hover:border-indigo-500' },
      purple: { bg: 'bg-purple-50', text: 'text-purple-500', hover: 'hover:border-purple-500' }
    };

    // UI Helper Functions
    window.showToast = (msg, type = 'success') => {
      const toast = document.createElement('div');
      toast.className = `px-6 py-4 rounded-2xl shadow-2xl text-sm font-bold text-white transition-all duration-300 transform translate-y-8 opacity-0 flex items-center gap-2 ${type==='error'?'bg-red-600':'bg-slate-900'} z-[200]`;
      toast.innerHTML = `<i data-lucide="${type==='error'?'alert-circle':'check'}"></i> ${msg}`;
      document.getElementById('toast-container').appendChild(toast);
      lucide.createIcons({ root: toast });
      requestAnimationFrame(()=>toast.classList.remove('translate-y-8', 'opacity-0'));
      setTimeout(()=>{ toast.classList.add('translate-y-8', 'opacity-0'); setTimeout(()=>toast.remove(), 300); }, 2500);
    };

    let confirmCallback = null;
    window.showConfirm = (title, msg, cb) => {
      document.getElementById('confirm-title').innerText = title;
      document.getElementById('confirm-message').innerText = msg;
      confirmCallback = cb;
      document.getElementById('confirm-modal').classList.remove('hidden');
    };
    window.closeConfirm = () => document.getElementById('confirm-modal').classList.add('hidden');
    document.getElementById('confirm-yes-btn').onclick = () => { if(confirmCallback) confirmCallback(); window.closeConfirm(); };

    window.switchTab = (tab) => {
      document.getElementById('tab-master').classList.toggle('hidden', tab !== 'master');
      document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
      const bM = document.getElementById('btn-tab-master');
      const bL = document.getElementById('btn-tab-logs');
      if(tab==='master') {
        bM.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm';
        bL.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-400 relative';
      } else {
        bM.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all text-slate-400';
        bL.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm relative';
      }
      window.scrollTo(0,0);
    };

    window.handleSearch = () => { searchTerm = document.getElementById('search-input').value.toLowerCase().trim(); renderProps(); };
    window.openLocation = (loc) => { selectedLocation = loc; currentView = 'items'; searchTerm = ''; document.getElementById('search-input').value = ''; renderProps(); };
    window.backToLocations = () => { selectedLocation = null; currentView = 'locations'; searchTerm = ''; renderProps(); };
    window.openOriginalImageFromModal = () => { const src = document.getElementById('form-img-preview').src; if(src && !src.includes('index.html')) { document.getElementById('modal-img-tag').src = src; document.getElementById('img-view-modal').classList.remove('hidden'); } };
    window.closeImgView = () => document.getElementById('img-view-modal').classList.add('hidden');

    // -------------------------------------------------------------------------
    // ★ 단일 통합 폼 제어 (열기/닫기)
    // -------------------------------------------------------------------------
    window.openPropModal = (id = null) => {
      const overlay = document.getElementById('prop-modal-overlay');
      const content = document.getElementById('prop-modal-content');
      
      if (id) {
        // 기존 소품 클릭 시 데이터 채워넣기
        const p = propsData.find(x => x.id === id);
        if(!p) return;
        document.getElementById('modal-main-title').innerText = '✨ 소품 상세 및 수정';
        document.getElementById('form-prop-id').value = p.id;
        
        document.getElementById('form-name').value = p.name;
        document.getElementById('form-category').value = p.category || '일반';
        document.getElementById('form-qty').value = p.qty || 1;
        document.getElementById('form-location').value = p.location || '';
        
        document.getElementById('form-outdate').value = p.outDate || '';
        document.getElementById('form-user').value = p.user || '';
        document.getElementById('form-note').value = p.note || '';
        document.getElementById('form-returned').checked = p.isReturned || false;

        document.getElementById('btn-delete').classList.remove('hidden');
        document.getElementById('btn-save-text').innerText = '수정 내용 저장';

        // 이미지 복원
        if (p.imageUrl) {
          document.getElementById('form-image-url').value = p.imageUrl;
          document.getElementById('form-img-preview').src = p.imageUrl;
          document.getElementById('form-img-preview').classList.remove('hidden');
          document.getElementById('form-no-img-icon').classList.add('hidden');
          document.getElementById('btn-remove-img').classList.remove('hidden');
          document.getElementById('upload-status-text').innerText = '사진 변경';
        } else {
          window.removeImage();
        }
      } else {
        // 플로팅 버튼(+) 클릭 시 빈 양식
        document.getElementById('modal-main-title').innerText = '✨ 소품 새로 등록';
        document.getElementById('form-prop-id').value = '';
        
        document.getElementById('form-name').value = '';
        document.getElementById('form-category').value = '일반';
        document.getElementById('form-qty').value = '1';
        document.getElementById('form-location').value = selectedLocation || '';

        document.getElementById('form-outdate').value = '';
        document.getElementById('form-user').value = '';
        document.getElementById('form-note').value = '';
        document.getElementById('form-returned').checked = false;

        document.getElementById('btn-delete').classList.add('hidden');
        document.getElementById('btn-save-text').innerText = '쇼룸에 추가하기';

        window.removeImage();
      }

      // 렌더링 타이밍 문제를 없애기 위해 클래스 변경
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      content.classList.remove('translate-y-full', 'sm:translate-y-10', 'sm:scale-95', 'opacity-0');
      content.classList.add('translate-y-0', 'sm:scale-100', 'opacity-100');
    };

    window.closePropModal = () => {
      const overlay = document.getElementById('prop-modal-overlay');
      const content = document.getElementById('prop-modal-content');
      
      overlay.classList.add('opacity-0', 'pointer-events-none');
      content.classList.remove('translate-y-0', 'sm:scale-100', 'opacity-100');
      content.classList.add('translate-y-full', 'sm:translate-y-10', 'sm:scale-95', 'opacity-0');
    };

    // -------------------------------------------------------------------------
    // ★ 이미지 업로드 및 압축 로직
    // -------------------------------------------------------------------------
    const compressImage = (file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
            } else {
              if (height > maxHeight) { width = Math.round(width * maxHeight / height); height = maxHeight; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
              resolve(new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", { type: 'image/jpeg', lastModified: Date.now() }));
            }, 'image/jpeg', quality);
          };
          img.onerror = error => reject(error);
        };
        reader.onerror = error => reject(error);
      });
    };

    window.handleImageUpload = async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const uploadText = document.getElementById('upload-status-text');
      const saveBtn = document.getElementById('btn-save-text');
      
      uploadText.innerText = '압축/업로드 중...';
      saveBtn.disabled = true;
      saveBtn.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const compressedFile = await compressImage(file, 1024, 1024, 0.8);
        const formData = new FormData();
        formData.append('file', compressedFile);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await response.json();
        
        if (data.secure_url) {
          document.getElementById('form-image-url').value = data.secure_url;
          document.getElementById('form-img-preview').src = data.secure_url;
          document.getElementById('form-img-preview').classList.remove('hidden');
          document.getElementById('form-no-img-icon').classList.add('hidden');
          document.getElementById('btn-remove-img').classList.remove('hidden');
          uploadText.innerText = '사진 변경';
        } else {
          throw new Error('Upload failed');
        }
      } catch (error) {
        window.showToast('업로드에 실패했습니다.', 'error');
        uploadText.innerText = '다시 시도';
      } finally {
        saveBtn.disabled = false;
        saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        event.target.value = ''; 
      }
    };

    window.removeImage = (e) => {
      if(e) e.stopPropagation();
      document.getElementById('form-image-url').value = '';
      document.getElementById('form-img-preview').src = '';
      document.getElementById('form-img-preview').classList.add('hidden');
      document.getElementById('form-no-img-icon').classList.remove('hidden');
      document.getElementById('btn-remove-img').classList.add('hidden');
      document.getElementById('upload-status-text').innerText = '사진 업로드';
    };

    // -------------------------------------------------------------------------
    // ★ Firebase 연동 및 데이터 저장/삭제
    // -------------------------------------------------------------------------
    const startApp = async () => {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'media-center-app';

      const login = async () => {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch(e) {}
      };

      await login();

      onAuthStateChanged(auth, (user) => {
        if (user) {
          const ind = document.getElementById('sync-indicator');
          ind.innerHTML = '<i data-lucide="cloud-check" class="w-3.5 h-3.5"></i> 동기화 완료';
          ind.className = 'flex items-center gap-1 text-[10px] font-bold px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100';
          lucide.createIcons({ root: ind });
          
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'props'), s => { propsData = s.docs.map(d => d.data()); renderProps(); });
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), s => { logs = s.docs.map(d => d.data()).sort((a,b)=>b.timestamp - a.timestamp); renderLogs(); });
        }
      });
    };

    window.handleSave = async () => {
      const id = document.getElementById('form-prop-id').value; 
      const name = document.getElementById('form-name').value.trim();
      if(!name) { window.showToast('소품명은 필수입니다.', 'error'); return; }

      const locName = document.getElementById('form-location').value.trim() || '미지정';

      const updatedData = {
        category: document.getElementById('form-category').value.trim() || '일반',
        name: name,
        qty: parseInt(document.getElementById('form-qty').value) || 1,
        location: locName,
        imageUrl: document.getElementById('form-image-url').value.trim(),
        outDate: document.getElementById('form-outdate').value.trim(),
        user: document.getElementById('form-user').value.trim(),
        note: document.getElementById('form-note').value.trim(),
        isReturned: document.getElementById('form-returned').checked
      };

      try {
        const batch = writeBatch(db);
        let logsToPush = [];

        if (id) {
          // 수정 모드
          const origin = propsData.find(x => x.id === id);
          const finalItem = { ...origin, ...updatedData };
          batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'props', id), finalItem);
          
          if(origin.outDate !== finalItem.outDate || origin.user !== finalItem.user) logsToPush.push(`${finalItem.user || '익명'} 반출 (${finalItem.outDate || '일자미상'})`);
          if(origin.isReturned !== finalItem.isReturned && finalItem.isReturned) logsToPush.push(`${finalItem.user || '익명'} 반납 완료`);

          window.showToast('수정되었습니다.');
        } else {
          // 신규 등록
          const newId = 'p_' + Date.now();
          const newItem = { id: newId, ...updatedData };
          batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'props', newId), newItem);
          window.showToast('등록되었습니다.');
        }

        // 로그 기록
        logsToPush.forEach(m => {
          const lid = 'l_' + Date.now() + Math.random();
          batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'logs', lid), { 
            id:lid, timestamp:Date.now(), time: new Date().toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }),
            propName: updatedData.name, action: m, user: updatedData.user || '관리자' 
          });
        });

        await batch.commit();
        closePropModal();
      } catch(e) { window.showToast('저장 실패', 'error'); }
    };

    window.handleDelete = () => {
      const id = document.getElementById('form-prop-id').value;
      const p = propsData.find(x=>x.id===id);
      window.showConfirm('소품 삭제', `'${p.name}' 정보를 완전히 삭제할까요?`, async () => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'props', id));
          window.showToast('삭제되었습니다.');
          closePropModal();
        } catch(e) { window.showToast('삭제 실패', 'error'); }
      });
    };

    window.deleteLocationCollection = (loc, e) => {
      e.stopPropagation();
      const targets = propsData.filter(x=>x.location === loc);
      window.showConfirm('컬렉션 일괄 삭제', `'${loc}' 위치의 모든 소품(${targets.length}개)을 삭제할까요?`, async () => {
        try {
          const batch = writeBatch(db);
          targets.forEach(x => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'props', x.id)));
          await batch.commit();
          window.showToast('컬렉션이 삭제되었습니다.');
          if(selectedLocation === loc) backToLocations();
        } catch(e) { window.showToast('삭제 실패', 'error'); }
      });
    };

    // -------------------------------------------------------------------------
    // ★ Render Engines
    // -------------------------------------------------------------------------
    function renderProps() {
      const container = document.getElementById('props-container');
      
      if (searchTerm) {
        const filtered = propsData.filter(x => x.name.toLowerCase().includes(searchTerm) || x.category.toLowerCase().includes(searchTerm) || x.user.toLowerCase().includes(searchTerm));
        if(!filtered.length) { container.innerHTML = `<div class="py-20 text-slate-300 font-bold text-center">검색 결과가 없습니다.</div>`; return; }
        container.innerHTML = `<h2 class="text-slate-400 font-extrabold text-[11px] mb-4 uppercase tracking-widest">Search Results (${filtered.length})</h2><div class="grid grid-cols-2 gap-4 animate-fade-in">${filtered.map(p => genPropCard(p)).join('')}</div>`;
        lucide.createIcons(); return;
      }

      if (currentView === 'locations') {
        const groups = {}; 
        
        // 데이터에서 자동으로 위치 이름 기반으로 색상 인식
        propsData.forEach(p => {
          let autoColor = 'slate';
          if(p.location.includes('파랑') || p.location.includes('파란')) autoColor = 'indigo';
          else if(p.location.includes('빨간') || p.location.includes('빨강')) autoColor = 'red';
          else if(p.location.includes('보라')) autoColor = 'purple';
          else if(p.location.includes('주황')) autoColor = 'amber';
          else if(p.location.includes('초록')) autoColor = 'emerald';

          if(!groups[p.location]) groups[p.location] = { count: 0, color: autoColor };
          groups[p.location].count++;
        });
        
        // 문자열에 포함된 숫자를 인식하여 오름차순으로 완벽하게 정렬
        const keys = Object.keys(groups).sort((a, b) => {
          const numA = parseInt(a.match(/\d+/)?.[0] || '999', 10);
          const numB = parseInt(b.match(/\d+/)?.[0] || '999', 10);
          return numA !== numB ? numA - numB : a.localeCompare(b);
        });

        if(!keys.length) { 
          container.innerHTML = `<div class="py-20 flex flex-col items-center justify-center text-center"><i data-lucide="package-open" class="w-12 h-12 text-slate-200 mb-4"></i><p class="text-slate-400 font-bold">소품이 비어있습니다.</p></div>`; 
          lucide.createIcons(); return; 
        }
        
        container.innerHTML = `<h2 class="text-slate-400 font-extrabold text-[11px] mb-4 uppercase tracking-widest">Collections</h2><div class="space-y-3 animate-fade-in">${keys.map(k => {
          const c = colorMap[groups[k].color] || colorMap['slate'];
          return `
          <div onclick="openLocation('${k}')" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between group ${c.hover} transition-all cursor-pointer">
            <div class="flex items-center gap-4">
              <div class="${c.bg} w-12 h-12 rounded-2xl flex items-center justify-center ${c.text} group-hover:scale-110 transition-transform"><i data-lucide="layout-grid" class="w-5 h-5"></i></div>
              <div><h3 class="font-extrabold text-slate-900">${k}</h3><p class="text-[10px] font-bold text-slate-400 uppercase">${groups[k].count} Items</p></div>
            </div>
            <button onclick="deleteLocationCollection('${k}', event)" class="p-2 text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
          </div>`}).join('')}</div>`;
        lucide.createIcons(); return;
      }

      const items = propsData.filter(x => x.location === selectedLocation);
      container.innerHTML = `<div class="flex items-center gap-3 mb-6 animate-fade-in">
        <button onclick="backToLocations()" class="w-10 h-10 bg-white border border-slate-100 rounded-full flex items-center justify-center text-slate-900 shadow-sm hover:bg-slate-50 transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
        <div><h2 class="font-extrabold text-xl text-slate-900 leading-none">${selectedLocation}</h2><p class="text-[10px] font-bold text-indigo-500 mt-1 uppercase">${items.length} Items</p></div>
      </div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-7 animate-fade-in">${items.map(p => genPropCard(p)).join('')}</div>`;
      lucide.createIcons();
    }

    function genPropCard(p) {
      const isOut = p.outDate && !p.isReturned;
      return `
        <div onclick="openPropModal('${p.id}')" class="flex flex-col gap-2 cursor-pointer group">
          <div class="relative w-full aspect-square rounded-[24px] overflow-hidden bg-slate-50 border border-slate-100 shadow-sm group-hover:shadow-md transition-all">
            ${p.imageUrl ? `<img src="${p.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" loading="lazy" />` : `<div class="w-full h-full flex items-center justify-center text-slate-200"><i data-lucide="image" class="w-8 h-8 opacity-50"></i></div>`}
            <div class="absolute top-2.5 left-2.5 ${isOut?'bg-slate-900/90 text-white':'bg-white/95 text-slate-900 border border-slate-100'} backdrop-blur-sm text-[10px] font-extrabold px-2 py-1 rounded-lg shadow-sm">
              ${isOut?'반출중':'보관중'}
            </div>
          </div>
          <div class="px-1">
            <div class="text-[9px] font-extrabold text-indigo-500 mb-0.5 uppercase tracking-tighter">${p.location}</div>
            <h3 class="text-sm font-extrabold text-slate-900 truncate leading-snug">${p.name}</h3>
            <p class="text-[11px] font-bold text-slate-400 mt-0.5">수량 ${p.qty}${isOut&&p.user?` · ${p.user}`:''}</p>
          </div>
        </div>`;
    }

    function renderLogs() {
      const container = document.getElementById('logs-container');
      const badge = document.getElementById('log-badge-container');
      const filtered = logs.filter(l => l.action.includes('반출') || l.action.includes('반납'));
      badge.innerHTML = filtered.length ? `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>` : '';
      if(!filtered.length) { container.innerHTML = `<div class="py-20 text-center"><i data-lucide="clock" class="w-10 h-10 text-slate-200 mx-auto mb-3"></i><p class="text-slate-300 font-bold">내역이 없습니다.</p></div>`; lucide.createIcons(); return; }
      container.innerHTML = `<div class="relative border-l-2 border-slate-100 ml-4 space-y-6 pb-10 pt-4 animate-fade-in">${filtered.map(l => `
        <div class="relative pl-7">
          <div class="absolute w-3 h-3 bg-white border-2 border-indigo-500 rounded-full -left-[7.5px] top-1.5"></div>
          <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col gap-1.5">
            <div class="flex justify-between items-center mb-1"><span class="text-[10px] font-extrabold text-slate-300 uppercase">${l.time}</span><span class="text-[10px] font-extrabold bg-slate-50 text-slate-500 px-2 py-0.5 rounded-md">${l.user}</span></div>
            <div class="font-extrabold text-sm text-slate-800">${l.propName}</div>
            <div class="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1.5 rounded-xl w-fit mt-1">${l.action}</div>
          </div>
        </div>`).join('')}</div>`;
      lucide.createIcons();
    }

    startApp();
  </script>
</body>
</html>
